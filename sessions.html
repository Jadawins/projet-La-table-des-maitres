<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions — La Table du Maître</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/sessions.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
<div class="page-container">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- CONTENU -->
  <main class="sessions-page">
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>

    <div class="sessions-header">
      <div>
        <h1><i class="fa-solid fa-dice-d20"></i> Sessions</h1>
        <p>Rejoignez une aventure ou créez la vôtre</p>
      </div>
      <a href="creer-session.html" class="btn-creer-session" id="btn-creer">
        <i class="fa-solid fa-plus"></i> Créer une session
      </a>
    </div>

    <!-- TOOLBAR -->
    <div class="sessions-toolbar">
      <input type="text" id="recherche" placeholder="Rechercher une session…" autocomplete="off" />
      <div class="filter-pills">
        <button class="filter-pill active" data-statut="toutes">Toutes</button>
        <button class="filter-pill" data-statut="recrutement">Recrutement</button>
        <button class="filter-pill" data-statut="en_cours">En cours</button>
        
        <button class="filter-pill" data-statut="terminee">Terminées</button>
      </div>
    </div>

    <!-- MES SESSIONS -->
    <div id="mes-sessions-section" style="display:none">
      <p class="sessions-section-title"><i class="fa-solid fa-star"></i> Mes sessions</p>
      <div class="sessions-grid" id="mes-sessions-grid"></div>
    </div>

    <!-- TOUTES LES SESSIONS -->
    <p class="sessions-section-title" id="autres-title"><i class="fa-solid fa-globe"></i> Sessions disponibles</p>
    <div class="sessions-grid" id="sessions-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- AUTH -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
  const { url, key } = await res.json();
  const supabase = createClient(url, key);
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = "login.html"; }
  else {
    window.SUPABASE_TOKEN = session.access_token;
    window.USER_ID = session.user.id;
    window.USER_PSEUDO = session.user.user_metadata?.full_name || session.user.user_metadata?.preferred_username || session.user.email;
  }
</script>

<!-- SIDEBAR -->
<script type="module">
  import { toggleSidebar } from './js/sidebar.js';
  window.toggleSidebar = toggleSidebar;
</script>

<!-- THÈME -->
<div class="theme-toggle-container">
  <button id="theme-toggle" class="lanterne-btn">
    <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
  </button>
</div>
<script src="js/theme.js"></script>

<!-- SESSIONS JS -->
<script src="js/sessions.js"></script>

<script src="js/notifications.js"></script>
</body>
</html>
