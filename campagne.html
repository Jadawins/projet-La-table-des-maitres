<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes campagnes — La Table du Maître</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/campagne.css">
  <link rel="stylesheet" href="css/campagne-v2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
<div class="page-container">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="camp-page">
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>

    <!-- Header -->
    <div class="camp-header">
      <div class="camp-header-label">📖 Atelier du Maître</div>
      <div class="camp-header-content">
        <div>
          <h1 class="camp-title">Mes campagnes</h1>
          <p class="camp-subtitle" id="campagnes-count">Chargement…</p>
        </div>
        <button class="btn btn--primary" onclick="ouvrirModalCreer()">
          <i class="fa-solid fa-plus"></i> Nouvelle campagne
        </button>
      </div>
    </div>

    <!-- Toolbar filters -->
    <div class="camp-toolbar" id="camp-toolbar">
      <button class="camp-filter-btn active" data-filter="toutes">
        Toutes <span class="camp-filter-count" id="count-toutes">0</span>
      </button>
      <button class="camp-filter-btn" data-filter="en_cours">
        En cours <span class="camp-filter-count" id="count-en_cours">0</span>
      </button>
      <button class="camp-filter-btn" data-filter="preparation">
        Préparation <span class="camp-filter-count" id="count-preparation">0</span>
      </button>
      <button class="camp-filter-btn" data-filter="terminee">
        Achevées <span class="camp-filter-count" id="count-terminee">0</span>
      </button>
    </div>

    <!-- List -->
    <div class="camp-list" id="campagnes-grid">
      <div class="camp-empty">
        <div class="camp-empty__icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
        <p>Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- MODAL CRÉATION -->
<div class="camp-modal-overlay hidden" id="modal-creer">
  <div class="camp-modal">
    <button class="camp-modal-close" onclick="fermerModal()">✕</button>
    <div class="camp-modal-title">
      <i class="fa-solid fa-book-skull"></i> Nouvelle campagne
    </div>
    <div class="camp-form-group">
      <label class="camp-form-label">Nom de la campagne</label>
      <input class="camp-form-input" type="text" id="c-nom" placeholder="La Malédiction de Strahd…" />
    </div>
    <div class="camp-form-group">
      <label class="camp-form-label">Description</label>
      <textarea class="camp-form-textarea" id="c-desc" placeholder="Un résumé de la campagne…" rows="3"></textarea>
    </div>
    <div class="camp-form-group">
      <label class="camp-form-label">Statut initial</label>
      <select class="camp-form-select" id="c-statut">
        <option value="preparation">En préparation</option>
        <option value="en_cours">En cours</option>
      </select>
    </div>
    <div class="camp-modal-actions">
      <button class="btn btn--ghost" onclick="fermerModal()">Annuler</button>
      <button class="btn btn--primary" onclick="creerCampagne()">
        <i class="fa-solid fa-plus"></i> Créer
      </button>
    </div>
  </div>
</div>

<!-- AUTH -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
  const { url, key } = await res.json();
  const supabase = createClient(url, key);
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = "login.html"; }
  else { window.SUPABASE_TOKEN = session.access_token; window.dispatchEvent(new Event('supabase-ready')); }
</script>

<script src="js/campagne.js"></script>
<script type="module">
  import { toggleSidebar } from './js/sidebar.js';
  window.toggleSidebar = toggleSidebar;
</script>
<div class="theme-toggle-container">
  <button id="theme-toggle" class="lanterne-btn">
    <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
  </button>
</div>
<script src="js/theme.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
