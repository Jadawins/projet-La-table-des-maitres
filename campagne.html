<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Campagnes — La Table du Maître</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/campagne.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
<div class="page-container">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header sidebar-header-flex">
      <button class="toggle-glow" onclick="toggleSidebar()" aria-label="Menu">
        <img id="book-icon" src="assets/icone/livremagie.png" alt="Icône Livre" class="icon-book" />
      </button>
      <a href="param.html" class="sidebar-settings-button" aria-label="Paramètres">⚙️</a>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-nav-area">
        <h2>Menu MJ</h2>
        <ul class="sidebar-menu">
          <li><a href="createrace.html"><i class="fa-solid fa-dragon"></i> Création de nouvelles races</a></li>
          <li><a href="sessions.html?role=mj"><i class="fa-solid fa-scroll"></i> Mes Sessions (MJ)</a></li>
          <li><a href="campagne.html" class="active"><i class="fa-solid fa-book-skull"></i> Mes Campagnes</a></li>
        </ul>
        <h2>Menu Joueurs</h2>
        <ul class="sidebar-menu">
          <li><a href="mes-personnages.html"><i class="fa-solid fa-user-shield"></i> Mes Personnages</a></li>
          <li><a href="sessions.html?role=joueur"><i class="fa-solid fa-dice-d20"></i> Mes Sessions (Joueur)</a></li>
          <li><a href="bibliotheque.html"><i class="fa-solid fa-book-open"></i> Bibliothèque</a></li>
        </ul>
      </div>
      <div class="sidebar-footer">
        <a href="home.html"><i class="fa-solid fa-house"></i> Page d'accueil site</a>
      </div>
    </div>
  </aside>

  <!-- CONTENU -->
  <main class="campagne-page">
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>

    <h1><i class="fa-solid fa-book-skull"></i> Mes Campagnes</h1>
    <p class="page-subtitle">Créez et gérez vos campagnes de jeu de rôle</p>

    <div class="campagne-topbar">
      <span id="campagnes-count" style="color:#777;font-size:0.82rem;"></span>
      <button class="btn-primary" onclick="ouvrirModalCreer()">
        <i class="fa-solid fa-plus"></i> Nouvelle campagne
      </button>
    </div>

    <div id="campagnes-grid" class="campagnes-grid">
      <div class="empty-state">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- MODAL CRÉATION -->
<div class="modal-overlay hidden" id="modal-creer">
  <div class="modal-box">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <p class="modal-title"><i class="fa-solid fa-plus"></i> Nouvelle campagne</p>
    <div class="form-group">
      <label>Nom de la campagne</label>
      <input type="text" id="c-nom" placeholder="La Malédiction de Strahd…" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="c-desc" placeholder="Un résumé de la campagne…" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Statut initial</label>
      <select id="c-statut">
        <option value="preparation">En préparation</option>
        <option value="en_cours">En cours</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="fermerModal()">Annuler</button>
      <button class="btn-primary" onclick="creerCampagne()">
        <i class="fa-solid fa-plus"></i> Créer
      </button>
    </div>
  </div>
</div>

<!-- AUTH -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
  const { url, key } = await res.json();
  const supabase = createClient(url, key);
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = "login.html"; }
  else { window.SUPABASE_TOKEN = session.access_token; window.dispatchEvent(new Event('supabase-ready')); }
</script>

<script src="js/campagne.js"></script>
<script type="module">
  import { toggleSidebar } from './js/sidebar.js';
  window.toggleSidebar = toggleSidebar;
</script>
<div class="theme-toggle-container">
  <button id="theme-toggle" class="lanterne-btn">
    <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
  </button>
</div>
<script src="js/theme.js"></script>
</body>
</html>
