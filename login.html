<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - La Table du Maître</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/style-clean.css">  
</head>
<body>
 <div class="container">
   <div class="signup-box">
      <h2>Connexion</h2>      
       <form id="login-form" style="display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%;">
        <input type="email" name="email" placeholder="Adresse e-mail" required class="input-style">
        <div class="pwd-wrapper">
          <input type="password" name="password" placeholder="Mot de passe" required class="input-style">
          <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
        </div>
        <button type="submit" class="btn-style">Se connecter </button>
       
       <p class="reset-link">
        <a href="#" id="reset-password-link">Mot de passe oublié ?</a>
       </p>
       </form>
       <div class="or-divider"><span>OU</span></div>
       <div class="provider-buttons">
        <button class="provider-btn" onclick="signInWithProvider('google')">
          <img src="assets/icone/google-icon.png" alt="Google" class="provider-logo">
          Continuer avec Google
        </button>

        <button class="provider-btn" onclick="signInWithProvider('discord')">
        <img src="assets/icone/discord-icon.png" alt="Discord" class="provider-logo">
        Continuer avec Discord
        </button>
    </div>
  </div>

  <div class="theme-toggle-container">
    <button id="theme-toggle" class="lanterne-btn">
      <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
    </button>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/pwd-toggle.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
