<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation du mot de passe</title>

  <!-- Gestion du theme clair/sombre directement au chargement -->
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>

  <!-- Chargement des CSS globaux -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/style-clean.css">
</head>

<body>

  <div class="container">
    <h1>Réinitialiser le mot de passe</h1>
    <p>Entrez votre nouveau mot de passe ci-dessous :</p>

    <div class="pwd-wrapper" style="margin-bottom:1rem;">
      <input type="password" id="new-password" placeholder="Nouveau mot de passe" class="input-style" />
      <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
    </div>
    <div class="pwd-wrapper" style="margin-bottom:1.5rem;">
      <input type="password" id="confirm-password" placeholder="Confirmer le mot de passe" class="input-style" />
      <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
    </div>
    <button id="update-password" class="btn-style" style="margin-top: 0.5rem;">Valider</button>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
    const { url, key } = await res.json();
    const supabase = createClient(url, key);

    document.getElementById("update-password").addEventListener("click", async () => {
      const newPassword = document.getElementById("new-password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (newPassword.length < 6) {
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
      }

      if (newPassword !== confirmPassword) {
        alert("Les mots de passe ne correspondent pas.");
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: newPassword
      });

      if (error) {
        alert("Erreur lors de la mise à jour du mot de passe : " + error.message);
      } else {
        alert("Mot de passe mis à jour avec succès ! Vous allez être redirigé vers la page de connexion.");
        window.location.href = "login.html";
      }
    });
  </script>

  <!-- Bouton de changement de thème (lanterne) -->
  <div class="theme-toggle-container">
    <button id="theme-toggle" class="lanterne-btn">
      <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
    </button>
  </div>

  <!-- Chargement des JS globaux -->
  <script type="module" src="js/sidebar.js"></script>
  <script src="js/pwd-toggle.js"></script>
  <script src="js/theme.js"></script>

  <!-- Fix pour rendre la fonction toggleSidebar disponible globalement -->
  <script type="module">
    import { toggleSidebar } from './js/sidebar.js';
    window.toggleSidebar = toggleSidebar;
  </script>

  <!-- Ton JS spécifique si besoin (ex: profil.js, etc) -->
  <!--<script type="module" src="js/TONFICHIERSPECIFIQUE.js"></script>-->
</body>
</html>
