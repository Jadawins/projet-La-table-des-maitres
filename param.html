<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parametres</title>

  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/style-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/param.css">
  <link rel="stylesheet" href="css/param-v2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/polish.css">
</head>

<body>

  <aside class="sidebar" id="sidebar"></aside>

  <main>
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>
    <div class="profil-container">
      <div class="tab-buttons">
        <button class="tab-btn" data-tab="password">Mot de passe</button>
      </div>

      <div class="tab-content" id="infos" style="display: block;">
        <h1 class="profil-title">Mon Profil</h1>

        <!-- Avatar + provider -->
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;">
          <div id="profil-avatar-wrap" style="width:64px;height:64px;border-radius:50%;overflow:hidden;background:rgba(134,93,255,.25);border:2px solid rgba(134,93,255,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <img id="profil-avatar-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;" />
            <span id="profil-initiales" style="font-size:1.4rem;font-weight:700;color:#c4b5fd;"></span>
          </div>
          <div>
            <div id="profil-pseudo-display" style="font-size:1rem;font-weight:600;color:#e2dfc8;"></div>
            <div id="profil-provider-badge" style="margin-top:.25rem;"></div>
          </div>
        </div>

        <!-- Stats rapides -->
        <div id="profil-stats" style="display:flex;gap:.75rem;margin-bottom:1.2rem;flex-wrap:wrap;">
          <div style="flex:1;min-width:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.6rem .9rem;text-align:center;">
            <div id="stat-personnages" style="font-size:1.4rem;font-weight:700;color:#c9a84c;">—</div>
            <div style="font-size:.72rem;color:#888;margin-top:.2rem;">Personnages</div>
          </div>
          <div style="flex:1;min-width:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.6rem .9rem;text-align:center;">
            <div id="stat-sessions-mj" style="font-size:1.4rem;font-weight:700;color:#865dff;">—</div>
            <div style="font-size:.72rem;color:#888;margin-top:.2rem;">Sessions MJ</div>
          </div>
          <div style="flex:1;min-width:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.6rem .9rem;text-align:center;">
            <div id="stat-sessions-joueur" style="font-size:1.4rem;font-weight:700;color:#4ade80;">—</div>
            <div style="font-size:.72rem;color:#888;margin-top:.2rem;">Sessions joueur</div>
          </div>
        </div>

        <div class="form-group">
          <label for="pseudo">Pseudo</label>
          <input type="text" id="pseudo" placeholder="Votre pseudo">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email" readonly>
        </div>
        <div class="form-group">
          <label for="discord">Discord</label>
          <input type="text" id="discord" placeholder="Votre pseudo Discord">
        </div>
        <button class="btn-style" id="save-pseudo">Enregistrer</button>
      </div>

      <div class="tab-content" id="password" style="display: none;">
        <h1 class="profil-title">Changer le mot de passe</h1>
        <div class="form-group">
          <label for="old-password">Mot de passe actuel</label>
          <div class="pwd-wrapper">
            <input type="password" id="old-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <label for="new-password">Nouveau mot de passe</label>
          <div class="pwd-wrapper">
            <input type="password" id="new-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmer</label>
          <div class="pwd-wrapper">
            <input type="password" id="confirm-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd(this)" title="Afficher/masquer"><svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </div>
        </div>
        <button class="btn-style" id="change-password">Changer</button>
      </div>

      <div class="profil-buttons">
        <button id="back-button" class="btn-style" onclick="history.back()">Retour</button>
        <button id="logout-button" class="btn-style btn-danger">Déconnexion</button>
      </div>
    </div>
  </main>

  <div class="theme-toggle-container">
    <button id="theme-toggle" class="lanterne-btn">
      <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
    </button>
  </div>

  <script type="module" src="js/sidebar.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/pwd-toggle.js"></script>
  <script type="module" src="js/authGuard.js"></script>
  <script type="module" src="js/param.js"></script>

  <script type="module">
    import { toggleSidebar } from './js/sidebar.js';
    window.toggleSidebar = toggleSidebar;
  </script>
<script src="js/notifications.js"></script>
</body>
</html>
