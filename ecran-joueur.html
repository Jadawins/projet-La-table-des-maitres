<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat — La Table du Maître</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ecran-mj.css">
  <link rel="stylesheet" href="css/combat.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ── Layout joueur ─────────────────────────────────────── */
    .joueur-layout {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      grid-template-rows: 100vh;
      height: 100vh;
      overflow: hidden;
      padding-top: 48px;
      box-sizing: border-box;
    }
    @media (max-width: 900px) {
      .joueur-layout { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; padding-top: 48px; }
      .joueur-col { max-height: none !important; }
    }
    .joueur-col {
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .joueur-col-header {
      padding: .6rem .85rem; font-size: .72rem; text-transform: uppercase;
      letter-spacing: .07em; color: #c9a84c; border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: .5rem; flex-shrink: 0;
    }
    .joueur-col-body { flex: 1; overflow-y: auto; padding: .6rem .7rem; }

    /* ── Barre PV joueur (haut) ────────────────────────────── */
    .joueur-pv-hero {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: .75rem 1rem; margin-bottom: .75rem;
    }
    .joueur-pv-hero-nom { font-size: 1rem; font-weight: 600; color: #e2dfc8; margin-bottom: .3rem; }
    .joueur-pv-hero-infos { display: flex; gap: 1rem; font-size: .75rem; color: #aaa; margin-bottom: .45rem; }
    .joueur-pv-nums { font-size: 1.4rem; font-weight: 700; color: #4ade80; }
    .joueur-pv-nums.bas { color: #f59e0b; }
    .joueur-pv-nums.zero { color: #ef4444; }

    /* ── Tour actuel ───────────────────────────────────────── */
    .tour-banner {
      padding: .45rem .85rem; border-radius: 6px; font-size: .82rem; font-weight: 600;
      margin-bottom: .6rem; text-align: center;
      background: rgba(134,93,255,0.15); border: 1px solid rgba(134,93,255,0.3); color: #c4b5fd;
    }
    .tour-banner.mon-tour {
      background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.5); color: #fbbf24;
      animation: pulse-gold 1.5s ease-in-out infinite;
    }
    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
      50%      { box-shadow: 0 0 12px 3px rgba(201,168,76,0.25); }
    }

    /* ── Tracking action/bonus/réaction ────────────────────── */
    .tracking-row {
      display: flex; gap: .5rem; margin-bottom: .7rem; flex-wrap: wrap;
    }
    .track-btn {
      flex: 1; min-width: 80px; padding: .4rem .5rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #ccc; font-size: .72rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .3rem; transition: all .2s;
    }
    .track-btn.used { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171; text-decoration: line-through; }
    .track-btn.available { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; }

    /* ── Initiative input ──────────────────────────────────── */
    .initiative-panel {
      background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25);
      border-radius: 7px; padding: .55rem .75rem; margin-bottom: .7rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .initiative-panel label { font-size: .75rem; color: #c9a84c; white-space: nowrap; }
    .initiative-panel input { width: 56px; }
    .initiative-panel button { padding: .3rem .7rem; font-size: .75rem; }

    /* ── Jets de mort ──────────────────────────────────────── */
    .jets-mort-panel {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35);
      border-radius: 8px; padding: .75rem 1rem; margin-bottom: .75rem;
    }
    .jets-mort-titre { font-size: .85rem; font-weight: 600; color: #f87171; margin-bottom: .55rem; }
    .jets-mort-dots { display: flex; gap: .35rem; margin: .25rem 0 .5rem; }
    .jm-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #555; background: transparent; }
    .jm-dot.succes { background: #4ade80; border-color: #4ade80; }
    .jm-dot.echec  { background: #ef4444; border-color: #ef4444; }
    .jets-mort-btns { display: flex; gap: .4rem; flex-wrap: wrap; }
    .jm-btn { padding: .35rem .75rem; border-radius: 6px; border: none; cursor: pointer; font-size: .75rem; font-weight: 600; }
    .jm-btn.succes { background: rgba(74,222,128,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.4); }
    .jm-btn.echec  { background: rgba(239,68,68,0.2);  color: #f87171; border: 1px solid rgba(239,68,68,0.4); }
    .jm-btn.nat20  { background: rgba(250,204,21,0.2);  color: #fbbf24; border: 1px solid rgba(250,204,21,0.4); }
    .jm-btn.nat1   { background: rgba(127,29,29,0.4);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.5); }

    /* ── Sélection de cible ────────────────────────────────── */
    .cible-active { outline: 2px solid #c9a84c; outline-offset: 2px; }
    .cible-select-row { font-size: .7rem; color: #aaa; margin-bottom: .5rem; display: flex; align-items: center; gap: .4rem; }
    .cible-nom-badge { padding: .15rem .5rem; background: rgba(201,168,76,0.2); border-radius: 4px; color: #fbbf24; font-size: .72rem; }

    /* ── Boutons d'actions ─────────────────────────────────── */
    .actions-section { margin-bottom: .85rem; }
    .actions-section-titre {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: #aaa;
      margin-bottom: .35rem; padding-bottom: .2rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .actions-grid { display: flex; flex-wrap: wrap; gap: .35rem; }
    .btn-action-joueur {
      padding: .35rem .65rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #e2dfc8; font-size: .75rem; cursor: pointer;
      transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: .15rem;
      min-width: 70px;
    }
    .btn-action-joueur:hover { background: rgba(134,93,255,0.2); border-color: rgba(134,93,255,0.5); }
    .btn-action-joueur.atk { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); }
    .btn-action-joueur.atk:hover { background: rgba(239,68,68,0.25); }
    .btn-action-joueur.soin { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.08); }
    .btn-action-joueur.soin:hover { background: rgba(74,222,128,0.2); }
    .btn-action-joueur .btn-degats { font-size: .65rem; color: #f87171; }
    .btn-action-joueur .btn-bonus  { font-size: .65rem; color: #c9a84c; }
    .btn-action-joueur.disabled { opacity: .4; cursor: not-allowed; }

    /* ── Sorts ─────────────────────────────────────────────── */
    .slots-row { display: flex; gap: .3rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .slot-badge {
      width: 26px; height: 26px; border-radius: 5px; border: 1px solid rgba(134,93,255,0.4);
      background: rgba(134,93,255,0.15); color: #c4b5fd; font-size: .7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all .15s;
    }
    .slot-badge.vide { background: rgba(50,50,50,0.4); border-color: rgba(255,255,255,0.1); color: #555; cursor: default; }
    .sort-niveau-titre {
      font-size: .68rem; color: #865dff; text-transform: uppercase; letter-spacing: .06em;
      margin: .5rem 0 .25rem; display: flex; align-items: center; justify-content: space-between;
    }
    .sort-niveau-slots { display: flex; gap: .2rem; }
    .sort-item {
      padding: .3rem .6rem; border-radius: 5px; border: 1px solid rgba(134,93,255,0.3);
      background: rgba(134,93,255,0.08); color: #c4b5fd; font-size: .75rem; cursor: pointer;
      transition: all .15s; margin-bottom: .2rem; width: 100%; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sort-item:hover { background: rgba(134,93,255,0.25); }
    .sort-item.concentration::after { content: '🟣'; font-size: .65rem; }
    .sort-item.rituel::after { content: '📜'; font-size: .65rem; }
    .sort-ecole { font-size: .62rem; color: #888; }

    /* ── Ressources de classe ──────────────────────────────── */
    .ressource-item {
      display: flex; align-items: center; gap: .5rem; padding: .35rem .5rem;
      background: rgba(255,255,255,0.04); border-radius: 6px; margin-bottom: .3rem;
    }
    .ressource-nom { flex: 1; font-size: .78rem; color: #e2dfc8; }
    .ressource-uses { display: flex; gap: .25rem; }
    .use-dot {
      width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
      border: 2px solid rgba(201,168,76,0.5); background: rgba(201,168,76,0.2);
      transition: all .15s;
    }
    .use-dot.vide { background: transparent; border-color: rgba(255,255,255,0.15); }
    .ressource-repos { font-size: .6rem; color: #666; }

    /* ── Participants (col gauche) ─────────────────────────── */
    .participant-mini {
      padding: .45rem .6rem; border-radius: 7px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03); margin-bottom: .4rem; cursor: pointer;
      transition: all .15s;
    }
    .participant-mini:hover { background: rgba(255,255,255,0.07); }
    .participant-mini.actif { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.07); }
    .participant-mini.mort  { opacity: .5; }
    .participant-mini.cible-active { border-color: #c9a84c !important; background: rgba(201,168,76,0.12) !important; }
    .pm-header { display: flex; align-items: center; gap: .4rem; margin-bottom: .25rem; }
    .pm-nom { flex: 1; font-size: .8rem; color: #e2dfc8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pm-actif-badge { font-size: .65rem; color: #fbbf24; }
    .pm-pv-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .pm-pv-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .pm-pv-fill.haut  { background: #4ade80; }
    .pm-pv-fill.moyen { background: #f59e0b; }
    .pm-pv-fill.bas   { background: #ef4444; }
    .pm-pv-fill.zero  { background: #7f1d1d; width: 100% !important; }
    .pm-pv-nums { font-size: .68rem; color: #aaa; margin-top: .15rem; }
    .pm-conditions { display: flex; gap: .2rem; flex-wrap: wrap; margin-top: .2rem; }
    .pm-cond-badge { font-size: .6rem; padding: .1rem .3rem; background: rgba(239,68,68,0.15); border-radius: 3px; color: #fca5a5; }

    /* ── Modal sort ────────────────────────────────────────── */
    .modal-sort-info { font-size: .78rem; color: #aaa; margin: .4rem 0 .7rem; line-height: 1.5; }
    .sort-niveau-sel { display: flex; gap: .35rem; flex-wrap: wrap; margin: .4rem 0; }
    .btn-niveau-sort {
      padding: .3rem .6rem; border-radius: 5px; border: 1px solid rgba(134,93,255,0.4);
      background: rgba(134,93,255,0.1); color: #c4b5fd; font-size: .75rem; cursor: pointer;
    }
    .btn-niveau-sort.selected { background: rgba(134,93,255,0.4); border-color: #865dff; }
    .btn-niveau-sort:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Tabs (actions / sorts) ────────────────────────────── */
    .tabs-row { display: flex; gap: .3rem; margin-bottom: .7rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: .4rem; }
    .tab-btn-j {
      padding: .3rem .7rem; border-radius: 5px 5px 0 0; border: none;
      background: transparent; color: #888; font-size: .75rem; cursor: pointer; transition: all .15s;
    }
    .tab-btn-j.active { color: #c9a84c; border-bottom: 2px solid #c9a84c; }
    .tab-content-j { display: none; }
    .tab-content-j.active { display: block; }
  </style>
</head>
<body>

  <!-- ═══ TOPBAR ════════════════════════════════════════════════ -->
  <div class="mj-topbar">
    <div class="topbar-left">
      <a id="btn-retour" href="sessions.html" class="btn-retour">
        <i class="fa-solid fa-arrow-left"></i> Session
      </a>
      <span class="topbar-session-nom" id="topbar-session-nom">Chargement…</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="topbar-round" id="topbar-round"></span>
      <span class="synchro-indicator" id="synchro-indicator"><i class="fa-solid fa-rotate fa-spin"></i> Synchro</span>
    </div>
    <div class="topbar-right" style="font-size:.75rem;color:#aaa;" id="topbar-perso-nom"></div>
  </div>

  <!-- ═══ LAYOUT 3 COLONNES ════════════════════════════════════ -->
  <div class="joueur-layout">

    <!-- ─── COL GAUCHE : Participants ────────────────────────── -->
    <div class="joueur-col">
      <div class="joueur-col-header">
        <i class="fa-solid fa-list-ol"></i> Combat
        <span id="cible-label" class="cible-nom-badge" style="display:none;margin-left:auto;"></span>
      </div>
      <div class="joueur-col-body" id="participants-list">
        <div style="text-align:center;padding:2rem;color:#c9a84c;">
          <i class="fa-solid fa-spinner fa-spin"></i><p>Chargement…</p>
        </div>
      </div>
    </div>

    <!-- ─── COL CENTRALE : Actions joueur ────────────────────── -->
    <div class="joueur-col">
      <div class="joueur-col-header">
        <i class="fa-solid fa-gamepad"></i> Mes actions
      </div>
      <div class="joueur-col-body" id="actions-panel">
        <div style="text-align:center;padding:2rem;color:#c9a84c;">
          <i class="fa-solid fa-spinner fa-spin"></i>
        </div>
      </div>
    </div>

    <!-- ─── COL DROITE : Messagerie ──────────────────────────── -->
    <div class="joueur-col">
      <div class="joueur-col-header">
        <i class="fa-solid fa-comments"></i> Messagerie
      </div>
      <div class="joueur-col-body" id="messages-list">
        <div style="text-align:center;padding:2rem;color:#555;font-size:.82rem;">Aucun message</div>
      </div>
      <div style="padding:.5rem .7rem;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
        <div class="msg-form">
          <input type="text" id="msg-contenu" placeholder="Votre message…"
            onkeydown="if(event.key==='Enter')envoyerMessage()" />
          <button class="btn-send" onclick="envoyerMessage()" style="margin-top:.35rem;width:100%;">
            <i class="fa-solid fa-paper-plane"></i> Envoyer
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- ═══ MODAL : LANCER UN SORT ════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modal-sort">
    <div class="modal-box" style="max-width:420px;">
      <button class="modal-close" onclick="fermerModalSort()">✕</button>
      <p class="modal-title">🔮 <span id="modal-sort-nom"></span></p>
      <p class="modal-sort-info" id="modal-sort-desc"></p>
      <div id="modal-sort-niveau-wrap" style="display:none;">
        <div style="font-size:.72rem;color:#aaa;margin-bottom:.25rem;">Lancer avec un emplacement de :</div>
        <div class="sort-niveau-sel" id="modal-sort-niveaux"></div>
      </div>
      <div id="modal-sort-concentration" style="display:none;padding:.4rem .6rem;background:rgba(134,93,255,0.1);border-radius:5px;font-size:.75rem;color:#c4b5fd;margin:.5rem 0;">
        ⚠️ Sort de concentration — remplacera votre concentration active si applicable.
      </div>
      <div class="modal-actions" style="margin-top:.75rem;">
        <button class="btn-sm-secondary" onclick="fermerModalSort()">Annuler</button>
        <button class="btn-sm-primary" onclick="confirmerSort()">
          <i class="fa-solid fa-hat-wizard"></i> Lancer
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ MODAL : ATTAQUE ════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modal-attaque">
    <div class="modal-box" style="max-width:380px;">
      <button class="modal-close" onclick="fermerModalAttaque()">✕</button>
      <p class="modal-title">⚔️ <span id="modal-atk-nom"></span></p>
      <p style="font-size:.75rem;color:#aaa;margin-bottom:.5rem;" id="modal-atk-hint"></p>
      <div style="display:flex;gap:.4rem;margin-bottom:.5rem;align-items:center;">
        <button id="atk-avantage-btn" class="btn-advantage-toggle" data-state="normal" onclick="cycleAtkAvantage()" style="font-size:.72rem;padding:.25rem .55rem;">Normal</button>
        <div id="atk-d20-detail" style="font-size:.7rem;color:#c9a84c;margin-left:auto;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
        <div class="form-group">
          <label>Résultat d20</label>
          <input type="number" id="modal-atk-d20" min="1" max="20" placeholder="—" />
        </div>
        <div class="form-group">
          <label>Dégâts</label>
          <input type="number" id="modal-atk-degats" min="0" value="0" />
        </div>
      </div>
      <div class="modal-actions" style="margin-top:.6rem;">
        <button class="btn-sm-secondary" style="margin-right:auto;" onclick="lancerD20Attaque()">🎲 Lancer d20</button>
        <button class="btn-sm-secondary" onclick="fermerModalAttaque()">Annuler</button>
        <button class="btn-sm-primary" style="background:#6b0f0f;border-color:#991b1b;" onclick="confirmerAttaque()">Attaquer</button>
      </div>
    </div>
  </div>

  <!-- AUTH -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
    const { url, key } = await res.json();
    const supabase = createClient(url, key);
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = "login.html"; }
    else {
      window.SUPABASE_TOKEN = session.access_token;
      window.USER_ID = session.user.id;
      window.USER_PSEUDO = session.user.user_metadata?.full_name
        || session.user.user_metadata?.preferred_username
        || session.user.email || 'Joueur';
      window.dispatchEvent(new Event('supabase-ready'));
    }
  </script>

  <script src="js/notifications.js"></script>
  <script src="js/ecran-joueur.js"></script>
</body>
</html>
