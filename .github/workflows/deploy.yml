name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to myrpgtable.fr
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          fingerprint: SHA256:/ubrDOMg97DXbFs+aur4iY8QGaaK/5OVk3pxYr9c5bE
          script: |
            set -e
            echo "--- Pull du code ---"
            cd /var/www/myrpgtable/app
            git pull origin master
            echo "--- Déploiement terminé : $(date) ---"
