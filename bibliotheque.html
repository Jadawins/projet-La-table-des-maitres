<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliothèque — La Table du Maître</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/bibliotheque.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
  <div class="page-container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header sidebar-header-flex">
        <button class="toggle-glow" onclick="toggleSidebar()" aria-label="Menu">
          <img id="book-icon" src="assets/icone/livremagie.png" alt="Icône Livre" class="icon-book" />
        </button>
        <a href="param.html" class="sidebar-settings-button" aria-label="Paramètres">⚙️</a>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-nav-area">
          <h2>Menu MJ</h2>
          <ul class="sidebar-menu">
            <li><a href="createrace.html"><i class="fa-solid fa-dragon"></i> Création de nouvelles races</a></li>
            <li><a href="sessions.html?role=mj"><i class="fa-solid fa-scroll"></i> Mes Sessions (MJ)</a></li>
            <li><a href="campagne.html"><i class="fa-solid fa-book-skull"></i> Mes Campagnes</a></li>
          </ul>
          <h2>Menu Joueurs</h2>
          <ul class="sidebar-menu">
            <li><a href="mes-personnages.html"><i class="fa-solid fa-user-shield"></i> Mes Personnages</a></li>
            <li><a href="sessions.html?role=joueur"><i class="fa-solid fa-dice-d20"></i> Mes Sessions (Joueur)</a></li>
            <li><a href="bibliotheque.html" class="active"><i class="fa-solid fa-book-open"></i> Bibliothèque</a></li>
          </ul>
        </div>
        <div class="sidebar-footer">
          <a href="home.html"><i class="fa-solid fa-house"></i> Page d'accueil site</a>
        </div>
      </div>
    </aside>

    <!-- CONTENU PRINCIPAL -->
    <main class="biblio-page">
      <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
        <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
      </button>

      <div class="biblio-header">
        <h1><i class="fa-solid fa-book-open"></i> Bibliothèque</h1>
        <p>Sorts, classes, espèces, historiques, dons et équipements — PHB 2024</p>
      </div>

      <!-- RECHERCHE GLOBALE -->
      <div class="biblio-search-bar">
        <input type="text" id="recherche-globale" placeholder="Rechercher dans la bibliothèque…" autocomplete="off" />
      </div>

      <!-- ONGLETS -->
      <div class="biblio-tabs">
        <button class="biblio-tab active" data-tab="sorts"><i class="fa-solid fa-wand-sparkles"></i> Sorts</button>
        <button class="biblio-tab" data-tab="classes"><i class="fa-solid fa-shield-halved"></i> Classes</button>
        <button class="biblio-tab" data-tab="especes"><i class="fa-solid fa-dragon"></i> Espèces</button>
        <button class="biblio-tab" data-tab="backgrounds"><i class="fa-solid fa-scroll"></i> Historiques</button>
        <button class="biblio-tab" data-tab="dons"><i class="fa-solid fa-star"></i> Dons</button>
        <button class="biblio-tab" data-tab="equipement"><i class="fa-solid fa-shield"></i> Équipement</button>
        <button class="biblio-tab" data-tab="glossaire"><i class="fa-solid fa-book"></i> Glossaire</button>
        <button class="biblio-tab" data-tab="monstres"><i class="fa-solid fa-skull-crossbones"></i> Monstres</button>
      </div>

      <!-- FILTRES DYNAMIQUES -->
      <div class="biblio-filters" id="biblio-filters"></div>

      <!-- COMPTEUR -->
      <p class="biblio-count" id="biblio-count"></p>

      <!-- GRILLE DES CARTES -->
      <div class="biblio-grid" id="biblio-grille"></div>

      <!-- PAGINATION -->
      <div class="biblio-pagination" id="biblio-pagination"></div>
    </main>

  </div>

  <!-- MODAL DÉTAIL -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- AUTH -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
    const { url, key } = await res.json();
    const supabase = createClient(url, key);
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) window.location.href = "login.html";
  </script>

  <!-- SIDEBAR -->
  <script type="module">
    import { toggleSidebar } from './js/sidebar.js';
    window.toggleSidebar = toggleSidebar;
  </script>

  <!-- THÈME -->
  <div class="theme-toggle-container">
    <button id="theme-toggle" class="lanterne-btn">
      <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
    </button>
  </div>
  <script src="js/theme.js"></script>

  <!-- BIBLIOTHÈQUE -->
  <script src="js/bibliotheque.js"></script>

<script src="js/notifications.js"></script>
</body>
</html>
