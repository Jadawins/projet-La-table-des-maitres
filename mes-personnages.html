<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes personnages — La Table du Maître</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/mes-personnages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
<div class="page-container">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="mp-page">
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>

    <!-- Header -->
    <div class="mp-header">
      <div class="mp-header-label">⚔ Votre compagnie</div>
      <div class="mp-header-content">
        <div>
          <h1 class="mp-title">Mes héros</h1>
          <p class="mp-subtitle" id="perso-count">Chargement…</p>
        </div>
        <a href="creer-personnage.html" class="btn btn--primary">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Nouveau héros
        </a>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="mp-toolbar">
      <div class="mp-filters" id="mp-filters">
        <button class="mp-filter-btn active" data-filter="tous">
          Tous <span class="mp-filter-count" id="count-tous">0</span>
        </button>
        <button class="mp-filter-btn" data-filter="vivants">
          Vivants <span class="mp-filter-count" id="count-vivants">0</span>
        </button>
        <button class="mp-filter-btn" data-filter="morts">
          † Tombés <span class="mp-filter-count" id="count-morts">0</span>
        </button>
      </div>
      <div class="mp-sort-area">
        <span>Trier par</span>
        <select class="mp-sort-select" id="mp-sort">
          <option value="recent">Plus récents</option>
          <option value="niveau">Niveau ↓</option>
          <option value="nom">Nom A-Z</option>
        </select>
      </div>
    </div>

    <!-- Grid -->
    <div class="mp-grid-container">
      <div class="mp-grid" id="perso-grid">
        <div class="mp-empty">
          <div class="mp-empty__icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
          <p class="mp-empty__text">Chargement…</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- AUTH -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
  const { url, key } = await res.json();
  const supabase = createClient(url, key);
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = "login.html"; }
  else { window.SUPABASE_TOKEN = session.access_token; window.dispatchEvent(new Event('supabase-ready')); }
</script>

<script src="js/mes-personnages.js"></script>

<script type="module">
  import { toggleSidebar } from './js/sidebar.js';
  window.toggleSidebar = toggleSidebar;
</script>
<div class="theme-toggle-container">
  <button id="theme-toggle" class="lanterne-btn">
    <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
  </button>
</div>
<script src="js/theme.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
