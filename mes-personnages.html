<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes personnages — La Table du Maître</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/ui-clean.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/personnage.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>
<body>
<div class="page-container">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- CONTENU -->
  <main class="perso-page">
    <button id="closed-book-button" onclick="toggleSidebar()" class="toggle-glow hidden" aria-label="Ouvrir Menu">
      <img src="assets/icone/livrefermer.png" alt="Icône Livre Fermé" class="icon-book" />
    </button>

    <h1><i class="fa-solid fa-user-shield"></i> Mes Personnages</h1>
    <p style="color:#bbb;font-size:0.85rem;margin-bottom:2rem;">Gérez vos personnages D&D 2024</p>

    <div class="perso-topbar">
      <span id="perso-count" style="color:#aaa;font-size:0.82rem;"></span>
      <a href="creer-personnage.html" class="btn-primary" style="text-decoration:none;">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Créer un personnage
      </a>
    </div>

    <div class="perso-grid" id="perso-grid">
      <div class="empty-state">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- AUTH -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const res = await fetch("https://myrpgtable.fr/api/GetSupabaseKey");
  const { url, key } = await res.json();
  const supabase = createClient(url, key);
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = "login.html"; }
  else { window.SUPABASE_TOKEN = session.access_token; window.dispatchEvent(new Event('supabase-ready')); }
</script>

<script src="js/mes-personnages.js"></script>

<script type="module">
  import { toggleSidebar } from './js/sidebar.js';
  window.toggleSidebar = toggleSidebar;
</script>
<div class="theme-toggle-container">
  <button id="theme-toggle" class="lanterne-btn">
    <img id="lanterne-icon" src="assets/img/sombre.png" alt="Changer de thème" />
  </button>
</div>
<script src="js/theme.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
